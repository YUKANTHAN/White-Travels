<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="White Travels | Book Flights">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css" integrity="sha512-1sCRPdkRXhBV2PBLUdRb4tMg1w2YPf37qatUFeS7zlBy7jJI8Lf4VHwWfZZfpXtYSLy85pkm9GaYVYMfw5BC1A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Book Flights | White Travels</title>
</head>
<body>
    
    <header>
        <a href="/" class="logo"><span>W</span>hite Travels</a>

        <nav class="navbar">
            <a href="/flights"><i class="fas fa-plane"></i> Flights</a>
            <a href="/hotels"><i class="fas fa-hotel"></i> Hotels</a>
            <a href="/trains"><i class="fas fa-train"></i> Trains</a>
            <a href="javascript:void(0)" onclick="toggleAIAssistant()" style="color: #fbbf24; font-weight: bold;"><i class="fas fa-robot"></i> AI Assistant</a>
            <a href="/#contact"><i class="fas fa-headset"></i> Support</a>
        </nav>

        <div class="icons" style="display: flex; align-items: center; gap: 1.5rem;">
            <div class="notification-container" style="position: relative; display: inline-block;">
                <i class="fas fa-bell" id="notification-btn" style="cursor: pointer; position: relative;">
                    <span id="notification-badge" style="position: absolute; top: -8px; right: -8px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 1.2rem; font-weight: bold; display: none;">0</span>
                </i>
                <div id="ai-notifications" style="display: none; position: absolute; top: 150%; right: -50px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); box-shadow: 0 0.5rem 1.5rem rgba(0,0,0,0.1); border-radius: 1rem; width: 450px; padding: 1.5rem; z-index: 1000; border: 1px solid var(--primary); text-align: left; cursor: default;">
                    <h3 style="font-size: 1.8rem; color: var(--primary); margin-bottom: 1rem; border-bottom: 1px solid #eee; padding-bottom: 0.5rem;"><i class="fas fa-shield-alt"></i> Disruption Command Center</h3>
                    <div id="dynamic-notifications">
                        <p style="font-size: 1.3rem; color: #666; text-align: center; padding: 1rem;">No recent disruptions detected.</p>
                    </div>
                </div>
            </div>
            <i class="fas fa-search" id="search-btn"></i>
            <i class="fas fa-user" id="login-btn"></i>
            {% if session.user_id != 5 %}
            <a href="/logout" class="btn" id="logout" style="margin-left: auto;">Logout</a>
            {% endif %}
        </div>
        <form action="javascript:void(0)" onsubmit="headerSearch(event)" class="search-bar-container">
            <input type="search" id="search-bar" placeholder="Enter destination (e.g. Cabo, Tokyo)...">
            <label for="search-bar" class="fas fa-search"></label>
        </form>
        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const notifBtn = document.getElementById('notification-btn');
                const aiNotifs = document.getElementById('ai-notifications');
                if(notifBtn && aiNotifs) {
                    notifBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        aiNotifs.style.display = aiNotifs.style.display === 'none' ? 'block' : 'none';
                    });
                    document.addEventListener('click', function(e) {
                        if (!notifBtn.contains(e.target) && !aiNotifs.contains(e.target)) {
                            aiNotifs.style.display = 'none';
                        }
                    });
                }
            });
        </script>
    </header>

    <section class="book" id="book" style="padding-top: 10rem;">
        <h1 class="heading">
            <span>f</span>
            <span>l</span>
            <span>i</span>
            <span>g</span>
            <span>h</span>
            <span>t</span>
            <span>s</span>
        </h1>

        <div class="row">
            <div class="image">
                <img src="{{url_for('static', filename='img/home.jpg')}}" alt="Book flights" style="border-radius: 1rem; width: 100%;">
            </div>

            <form action="/flights/search" method="POST">
                <div class="inputBox">
                    <h3>From: </h3>
                    <input type="text" name="origin" list="cities" placeholder="Origin City" required>
                </div>
                <div class="inputBox">
                    <h3>To: </h3>
                    <input type="text" name="destination" list="cities" placeholder="Destination City" required>
                </div>
                <div class="inputBox">
                    <h3>Departure Date: </h3>
                    <input type="date" name="departure_date" required>
                </div>
                <div class="inputBox">
                    <h3>Adults: </h3>
                    <input type="number" name="how_many" placeholder="Number of travelers" min="1" required>
                </div>
                <input type="submit" value="Search Flights" class="btn">
            </form>
        </div>
    </section>

    {% include 'cities.html' %}

    <script src="{{url_for('static', filename='js/script.js')}}"></script>
</body>
</html>
